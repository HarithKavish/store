name: Update latest.json

on:
  push:
    paths:
      - "apps/jarvis/mobile/android/jarvis-v*.apk"
  workflow_dispatch:

jobs:
  update-manifest:
    name: Update Jarvis latest.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Resolve latest version and update latest.json
        run: |
          TARGET="apps/jarvis/mobile/android"

          # Find the highest versioned APK using sort --version-sort
          LATEST_APK=$(ls "$TARGET"/jarvis-v*.apk 2>/dev/null | sort --version-sort | tail -1)

          if [ -z "$LATEST_APK" ]; then
            echo "No versioned APK found — skipping"
            exit 0
          fi

          FILENAME=$(basename "$LATEST_APK")
          VERSION=$(echo "$FILENAME" | sed 's/^jarvis-v//;s/\.apk$//')
          APK_URL="https://store.harithkavish.com/apps/jarvis/mobile/android/${FILENAME}"

          # Prefer release notes from the my_chatgpt repo release if available
          COMMIT_MSG=""
          if command -v curl >/dev/null 2>&1; then
            RELEASE_JSON=$(curl -s "https://api.github.com/repos/HarithKavish/my_chatgpt/releases/tags/v${VERSION}" || true)
            COMMIT_MSG=$(echo "$RELEASE_JSON" | jq -r '.body // empty' 2>/dev/null || true)
          fi
          # Fallback to most recent commit subject touching the android folder
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG=$(git log -1 --pretty=%s -- "$TARGET" | head -1)
            COMMIT_MSG=$(echo "$COMMIT_MSG" | sed 's/\[skip ci\]//g;s/\[no ci\]//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | cut -c1-120)
            if [ -z "$COMMIT_MSG" ]; then
              COMMIT_MSG="Bug fixes and improvements"
            fi
          fi

          echo "Version:  $VERSION"
          echo "APK URL:  $APK_URL"
          echo "Notes:    $COMMIT_MSG"

          jq -n \
            --arg version  "$VERSION" \
            --arg apk_url  "$APK_URL" \
            --arg notes    "$COMMIT_MSG" \
            '{version: $version, apk_url: $apk_url, release_notes: $notes}' \
            > "$TARGET/latest.json"

          echo "=== latest.json ==="
          cat "$TARGET/latest.json"

      - name: Commit updated latest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/jarvis/mobile/android/latest.json
          git diff --staged --quiet \
            && echo "Nothing to commit" \
            || git commit -m "chore: update latest.json [skip ci]"
          git push
